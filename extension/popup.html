<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background-color: #f8fafc;
    }
    .header {
      font-weight: 800;
      font-size: 16px;
      color: #1e293b;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }
    .btn:hover {
      background-color: #4338ca;
    }
    .btn:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      background-color: #f1f5f9;
    }
    .success {
      color: #059669;
      background-color: #ecfdf5;
      border: 1px solid #10b981;
    }
    .error {
      color: #dc2626;
      background-color: #fef2f2;
      border: 1px solid #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">WBTEAM Scraper</div>
  <button id="scrapeBtn" class="btn">AMBIL DATA DARI WEB</button>
  
  <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding: 10px; background: white; border-radius: 8px; border: 1px solid #e2e8f0;">
    <div style="display: flex; align-items: center; justify-content: space-between;">
      <span style="font-size: 13px; font-weight: 600; color: #475569;">Auto Sync (10s)</span>
      <label class="switch">
        <input type="checkbox" id="autoSyncToggle">
        <span class="slider round"></span>
      </label>
    </div>
    <div style="font-size: 10px; color: #94a3b8; font-style: italic;">
      * Website akan reload otomatis setiap 30 detik.
    </div>
  </div>

  <div style="margin-bottom: 12px;">
    <label style="display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase;">Dashboard URL</label>
    <input type="text" id="dashboardUrl" placeholder="http://localhost:3000" style="width: 100%; padding: 8px; font-size: 12px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
  </div>

  <div id="status" class="status">Buka halaman WBTEAM Attendance lalu klik tombol di atas.</div>

  <style>
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cbd5e1;
      transition: .4s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
    }
    input:checked + .slider {
      background-color: #4f46e5;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .slider.round {
      border-radius: 34px;
    }
    .slider.round:before {
      border-radius: 50%;
    }
  </style>
  <script src="popup.js"></script>
</body>
</html>
